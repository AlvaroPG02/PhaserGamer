<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dodger Phaser</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-color: #000;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('Assets/Fondo.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(12px);
      opacity: 0.65;
      z-index: 0;
    }
    #bloque_juego {
      width: 370px;
      height: 550px;
      position: relative;
      z-index: 1;
    }
    #autor {
      position: relative;
      z-index: 1;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 16px;
      margin-top: 12px;
      text-align: center;
    }
  </style>
  <script src="phaser.js"></script>
  <script src="main.js"></script>
</head>
<body>
  <div id="bloque_juego"></div>
  <div id="autor">Alvaro Pilco Gallardo</div>
</body>
</html>
